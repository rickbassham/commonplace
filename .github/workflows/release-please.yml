# Release-please-driven release-PR flow.
#
# Runs on every push to `main` and asks `googleapis/release-please-action`
# to either open/refresh a `chore(main): release X.Y.Z` PR (when there
# are unreleased conventional-commit-style changes) or post a no-op
# comment explaining why no PR was created. The release is cut by
# merging that PR: release-please then pushes the `vX.Y.Z` tag, after
# which the trailing dispatch step in this workflow fires
# `.github/workflows/release.yml` via `workflow_dispatch` to publish to
# npm and create the GitHub Release. The explicit dispatch is required
# because GitHub suppresses recursive workflow triggers from
# `GITHUB_TOKEN`-driven `push` events; `workflow_dispatch` is one of
# the documented exceptions that does trigger from `GITHUB_TOKEN`, so
# this avoids needing a PAT.
#
# Security: this workflow takes no user-controllable input (no PR/issue
# bodies, no commit messages substituted into `run:` blocks). The only
# step is a third-party action invocation; no `run:` shells are used.
#
# This workflow does NOT publish. The human gate on merging the release
# PR is the feature; auto-publish on every merge to main is explicitly
# out of scope.
name: Release Please

on:
  push:
    branches:
      - main

permissions:
  # release-please needs `contents: write` to push the release commit +
  # tag at PR-merge time, and `pull-requests: write` to open and update
  # the rolling release PR. `actions: write` lets the same GITHUB_TOKEN
  # call the workflow-dispatch API to fire release.yml on the new tag
  # (the no-PAT publish chain -- see the dispatch step below).
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v4
        with:
          # Both files at repo root. The action default is the same, but
          # naming them explicitly keeps the wiring legible to a reader
          # who hasn't memorised release-please defaults.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Dispatch release workflow on new tag
        # release-please-action pushes the `vX.Y.Z` tag with GITHUB_TOKEN
        # when the release PR is merged. GitHub suppresses recursive
        # workflow triggers from GITHUB_TOKEN-driven push events to
        # prevent infinite loops, so release.yml (which listens for tag
        # pushes) does NOT fire on its own. workflow_dispatch is one of
        # the documented exceptions that DOES trigger from GITHUB_TOKEN,
        # so we close the chain by dispatching release.yml on the new
        # tag here. No PAT required.
        #
        # Gated on `release_created`: this step is a no-op when the
        # action only opened/refreshed the rolling release PR (no tag
        # was pushed). The boolean is emitted as a string by the action,
        # hence the `== 'true'` comparison.
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The release-please job has no `actions/checkout` step, so the
          # runner workspace contains no `.git` directory. Without a repo
          # hint, `gh workflow run` aborts with `fatal: not a git
          # repository`. The `gh` CLI honours `GH_REPO` automatically,
          # which keeps the `run:` value short and matches the existing
          # env-block style for `GH_TOKEN` / `TAG_NAME`.
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.release.outputs.tag_name }}
        run: gh workflow run release.yml --ref "$TAG_NAME"
